<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>控制台 · 星空艺术兰 — KMTY（内部）</title>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="robots" content="noindex,nofollow">
<link rel="icon" type="image/png" href="images/favicon.png">
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{margin:0;background:#141018;color:#F3EEE4;
       font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Hiragino Sans GB','Microsoft YaHei','Noto Sans SC',system-ui,sans-serif;
       -webkit-font-smoothing:antialiased;
       padding:env(safe-area-inset-top) env(safe-area-inset-right) 120px env(safe-area-inset-left);
       background-image:radial-gradient(circle at 84% -4%,rgba(212,140,176,.12),transparent 46%),radial-gradient(circle at 6% 26%,rgba(46,78,158,.10),transparent 40%);}
  .wrap{max-width:640px;margin:0 auto;padding:22px 20px;}
  .mark{font-family:Georgia,'Songti SC','Noto Serif SC',serif;font-size:22px;font-weight:700;}
  .mark b{color:#E7B7CF;} .tag{font-size:11px;letter-spacing:.22em;color:#9b93a4;margin-left:8px;}
  .co{margin:10px 0 0;font-size:12px;color:#8d8596;}
  h1{margin:22px 0 6px;font-size:22px;font-weight:600;}
  .lead{margin:0 0 8px;font-size:13.5px;line-height:1.7;color:#bfb8c6;}
  .lead b{color:#E7B7CF;font-weight:600;}
  .row{display:flex;align-items:center;gap:10px;padding:11px 12px;border-radius:14px;margin:10px 0;
       background:rgba(243,238,228,.045);border:1px solid rgba(243,238,228,.14);}
  .row.out{opacity:.62;}
  .row input[type=color]{width:40px;height:40px;flex:0 0 auto;padding:0;border:1px solid rgba(243,238,228,.24);border-radius:10px;background:none;cursor:pointer;}
  .row .names{display:flex;flex-direction:column;gap:6px;flex:1 1 auto;min-width:0;}
  .row .names input{font-family:inherit;font-size:14px;color:#F3EEE4;background:rgba(243,238,228,.06);
       border:1px solid rgba(243,238,228,.2);border-radius:9px;padding:8px 10px;outline:none;width:100%;-webkit-appearance:none;}
  .row .names input:focus{border-color:#E7B7CF;}
  .row .names input::placeholder{color:#6f6879;}
  .row .st{flex:0 0 auto;font-size:12px;font-weight:600;letter-spacing:.03em;padding:8px 12px;border-radius:999px;cursor:pointer;border:none;font-family:inherit;}
  .row .st.in{background:rgba(120,190,140,.16);color:#9ad3a8;}
  .row .st.out{background:rgba(231,155,155,.16);color:#e79b9b;}
  .row .rm{flex:0 0 auto;width:34px;height:34px;border-radius:50%;border:1px solid rgba(231,155,155,.4);background:none;color:#e79b9b;font-size:16px;cursor:pointer;line-height:1;}
  .add{margin:14px 0 0;padding:13px;width:100%;border-radius:12px;border:1px dashed rgba(243,238,228,.32);
       background:rgba(243,238,228,.03);color:#cfc8d5;font-family:inherit;font-size:14px;cursor:pointer;}
  .add:active{transform:scale(.99);}
  .bar{position:fixed;left:0;right:0;bottom:0;z-index:20;padding:14px 20px calc(14px + env(safe-area-inset-bottom));
       background:linear-gradient(180deg,rgba(20,16,24,0),rgba(20,16,24,.96) 30%);display:flex;gap:12px;align-items:center;justify-content:center;flex-wrap:wrap;}
  .bar .inner{max-width:640px;width:100%;display:flex;gap:12px;align-items:center;}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border-radius:999px;cursor:pointer;
       font-family:inherit;font-size:15px;font-weight:500;padding:15px 22px;border:none;}
  .btn.save{flex:1 1 auto;background:#2F5D3A;color:#F3EEE4;}
  .btn.save:disabled{opacity:.5;}
  .btn.ghost{border:1px solid rgba(243,238,228,.34);background:rgba(243,238,228,.06);color:#F3EEE4;text-decoration:none;}
  .status{font-size:12.5px;color:#9ad3a8;min-height:16px;text-align:center;flex-basis:100%;}
  .status.err{color:#e79b9b;}
  .hint{margin:16px 0 0;font-size:12px;line-height:1.7;color:#8d8596;}
  /* gate */
  .gate{position:fixed;inset:0;z-index:40;background:#141018;display:flex;align-items:center;justify-content:center;padding:24px;}
  .gate .box{max-width:340px;width:100%;text-align:center;}
  .gate h2{font-family:Georgia,'Songti SC',serif;font-size:26px;margin:0 0 6px;}
  .gate p{font-size:13px;color:#9b93a4;margin:0 0 18px;}
  .gate input{font-family:inherit;font-size:16px;color:#F3EEE4;background:rgba(243,238,228,.06);border:1px solid rgba(243,238,228,.24);
       border-radius:12px;padding:14px;outline:none;width:100%;text-align:center;-webkit-appearance:none;}
  .gate input:focus{border-color:#E7B7CF;}
  .gate button{margin-top:12px;width:100%;padding:15px;border-radius:999px;border:none;background:#B0552F;color:#F3EEE4;font-family:inherit;font-size:15px;font-weight:500;cursor:pointer;}
  .gate .err{color:#e79b9b;font-size:12.5px;margin-top:12px;min-height:16px;}
  [hidden]{display:none !important;}
</style>
</head>
<body>
<div class="gate" id="gate">
  <div class="box">
    <div class="mark">KMTY <b>星空</b></div>
    <h2>控制台</h2>
    <p>请输入管理密码</p>
    <input id="pass" type="password" inputmode="text" autocomplete="current-password" placeholder="管理密码" enterkeyhint="go">
    <button id="enter" type="button">进入</button>
    <div class="err" id="gateErr"></div>
  </div>
</div>

<div class="wrap" id="app" hidden>
  <div><span class="mark">KMTY <b>星空</b></span><span class="tag">控制台 · ADMIN</span></div>
  <p class="co">昆明统一生物科技有限公司 · 内部工具（请勿分享此页）</p>
  <h1>颜色与库存</h1>
  <p class="lead">在这里改动会<b>立即对所有客户生效</b> — 无需改代码、无需分享特殊链接。<br>点<b>有货 / 缺货</b>切换库存，改中文名 / English / 色块可编辑颜色，最下方可加新颜色。改完记得点<b>保存并发布</b>。</p>
  <div id="rows"></div>
  <button class="add" id="add" type="button">＋ 添加一个颜色</button>
  <p class="hint">提示：改动保存后，客户下次打开下单页即可看到最新颜色与库存。缺货的颜色仍然显示，但会置灰、不可选。</p>
</div>

<div class="bar" id="bar" hidden>
  <div class="inner">
    <button class="btn save" id="save" type="button">保存并发布</button>
    <a class="btn ghost" id="open" href="/order" target="_blank" rel="noopener">下单页</a>
  </div>
  <div class="status" id="status"></div>
</div>

<script>
(function () {
  'use strict';
  var pass = '';
  try { pass = sessionStorage.getItem('kmty-admin-pass') || ''; } catch (e) {}
  var rowsEl = document.getElementById('rows');
  var statusEl = document.getElementById('status');
  var COLORS = [];

  function esc(s) { return String(s == null ? '' : s); }

  // ---- gate ----
  var gate = document.getElementById('gate'), app = document.getElementById('app'), bar = document.getElementById('bar');
  function openApp() { gate.hidden = true; app.hidden = false; bar.hidden = false; load(); }
  function enter() {
    var v = document.getElementById('pass').value || '';
    if (!v) { document.getElementById('gateErr').textContent = '请输入密码'; return; }
    pass = v; try { sessionStorage.setItem('kmty-admin-pass', v); } catch (e) {}
    openApp();
  }
  document.getElementById('enter').addEventListener('click', enter);
  document.getElementById('pass').addEventListener('keydown', function (e) { if (e.key === 'Enter') enter(); });
  if (pass) openApp();

  // ---- load current config (or bootstrap from the order page's palette) ----
  function load() {
    fetch('/api/config', { cache: 'no-store' })
      .then(function (r) { return r.json(); })
      .then(function (cfg) {
        if (cfg && Array.isArray(cfg.colors) && cfg.colors.length) { COLORS = cfg.colors; render(); }
        else bootstrap();
      })
      .catch(bootstrap);
  }
  function bootstrap() {
    // first run: seed the editor from the palette baked into the order page
    fetch('/constellation.html', { cache: 'no-store' })
      .then(function (r) { return r.text(); })
      .then(function (txt) {
        var m = txt.match(/var PALETTE\s*=\s*\[([\s\S]*?)\];/);
        COLORS = [];
        if (m) {
          var re = /\[\s*'([^']*)'\s*,\s*'([^']*)'\s*,\s*'(#[0-9A-Fa-f]{3,8})'\s*,\s*(true|false)\s*\]/g, mm;
          while ((mm = re.exec(m[1]))) COLORS.push({ zh: mm[2], en: mm[1], hex: mm[3], stock: mm[4] === 'true' });
        }
        render();
      })
      .catch(function () { COLORS = []; render(); });
  }

  // ---- render editable rows ----
  function render() {
    rowsEl.innerHTML = '';
    COLORS.forEach(function (c, i) { rowsEl.appendChild(rowEl(c, i)); });
  }
  function rowEl(c, i) {
    var row = document.createElement('div');
    row.className = 'row' + (c.stock === false ? ' out' : '');
    var hex = /^#[0-9A-Fa-f]{6}$/.test(c.hex || '') ? c.hex : '#CCCCCC';

    var col = document.createElement('input'); col.type = 'color'; col.value = hex;
    col.addEventListener('input', function () { COLORS[i].hex = col.value; });

    var names = document.createElement('div'); names.className = 'names';
    var zh = document.createElement('input'); zh.type = 'text'; zh.placeholder = '中文名'; zh.maxLength = 20; zh.value = esc(c.zh);
    zh.addEventListener('input', function () { COLORS[i].zh = zh.value; });
    var en = document.createElement('input'); en.type = 'text'; en.placeholder = 'English'; en.maxLength = 30; en.value = esc(c.en);
    en.addEventListener('input', function () { COLORS[i].en = en.value; });
    names.appendChild(zh); names.appendChild(en);

    var st = document.createElement('button'); st.type = 'button';
    var paint = function () {
      var inStock = COLORS[i].stock !== false;
      st.className = 'st ' + (inStock ? 'in' : 'out');
      st.textContent = inStock ? '有货' : '缺货';
      row.className = 'row' + (inStock ? '' : ' out');
    };
    st.addEventListener('click', function () { COLORS[i].stock = COLORS[i].stock === false; paint(); });
    paint();

    var rm = document.createElement('button'); rm.type = 'button'; rm.className = 'rm'; rm.textContent = '×'; rm.title = '删除';
    rm.addEventListener('click', function () { COLORS.splice(i, 1); render(); });

    row.appendChild(col); row.appendChild(names); row.appendChild(st); row.appendChild(rm);
    return row;
  }

  document.getElementById('add').addEventListener('click', function () {
    COLORS.push({ zh: '', en: '', hex: '#E7B7CF', stock: true });
    render();
    var last = rowsEl.lastElementChild;
    if (last) { last.scrollIntoView({ block: 'center' }); var f = last.querySelector('input[type=text]'); if (f) f.focus(); }
  });

  // ---- save to KV ----
  function setStatus(msg, err) { statusEl.textContent = msg; statusEl.className = 'status' + (err ? ' err' : ''); }
  document.getElementById('save').addEventListener('click', function () {
    var clean = COLORS.filter(function (c) { return (c.zh || '').trim() || (c.en || '').trim(); })
      .map(function (c) { return { zh: (c.zh || '').trim(), en: (c.en || '').trim(), hex: c.hex, stock: c.stock !== false }; });
    if (!clean.length) { setStatus('至少保留一个颜色', true); return; }
    var btn = document.getElementById('save'); btn.disabled = true; setStatus('保存中…');
    fetch('/api/config', {
      method: 'POST',
      headers: { 'content-type': 'application/json', 'x-admin-pass': pass },
      body: JSON.stringify({ colors: clean }),
    }).then(function (r) {
      btn.disabled = false;
      if (r.status === 401) {
        try { sessionStorage.removeItem('kmty-admin-pass'); } catch (e) {}
        pass = ''; app.hidden = true; bar.hidden = true; gate.hidden = false;
        document.getElementById('gateErr').textContent = '密码错误，请重试';
        document.getElementById('pass').value = '';
        return;
      }
      return r.json().then(function (res) {
        if (r.ok && res.colors) { COLORS = res.colors; render(); setStatus('已保存 ✓ · 已对所有客户生效'); }
        else setStatus((res && res.error) || '保存失败', true);
      });
    }).catch(function () { btn.disabled = false; setStatus('网络错误，请重试', true); });
  });
})();
</script>
</body>
</html>
