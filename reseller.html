<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>经销商门户 — KMTY</title>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="robots" content="noindex,nofollow">
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{margin:0;background:#141018;color:#F3EEE4;
       font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Hiragino Sans GB','Microsoft YaHei','Noto Sans SC',system-ui,sans-serif;
       -webkit-font-smoothing:antialiased;padding:env(safe-area-inset-top) env(safe-area-inset-right) 60px env(safe-area-inset-left);
       background-image:radial-gradient(circle at 84% -4%,rgba(212,140,176,.12),transparent 46%),radial-gradient(circle at 6% 26%,rgba(46,78,158,.10),transparent 40%);}
  .wrap{max-width:640px;margin:0 auto;padding:20px 18px;}
  .mark{font-family:Georgia,'Songti SC','Noto Serif SC',serif;font-size:22px;font-weight:700;}
  .mark b{color:#E7B7CF;} .tag{font-size:11px;letter-spacing:.22em;color:#9b93a4;margin-left:8px;}
  .head{display:flex;align-items:center;gap:12px;}
  .head img{height:40px;max-width:120px;object-fit:contain;}
  h1{margin:18px 0 4px;font-size:20px;font-weight:600;}
  .lead{margin:0 0 10px;font-size:13px;line-height:1.7;color:#bfb8c6;}
  .linkcard{margin:14px 0;padding:14px;border-radius:14px;background:rgba(212,140,176,.09);border:1px solid rgba(212,140,176,.28);}
  .linkcard .h{font-size:11px;letter-spacing:.14em;color:#E7B7CF;margin:0 0 8px;}
  .linkcard .url{font-family:ui-monospace,Menlo,monospace;font-size:13px;word-break:break-all;color:#F3EEE4;background:rgba(0,0,0,.28);border-radius:9px;padding:10px;}
  .obar{display:flex;gap:10px;align-items:center;margin:16px 0 6px;flex-wrap:wrap;}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border-radius:999px;cursor:pointer;font-family:inherit;font-size:14px;font-weight:500;padding:11px 18px;border:1px solid rgba(243,238,228,.34);background:rgba(243,238,228,.06);color:#F3EEE4;text-decoration:none;}
  .btn.solid{background:#B0552F;border:none;}
  .ord{padding:12px 14px;border-radius:14px;margin:10px 0;background:rgba(243,238,228,.045);border:1px solid rgba(243,238,228,.14);}
  .ord .who{font-weight:600;font-size:15px;} .ord .meta{font-size:12px;color:#9b93a4;margin-top:3px;}
  .ord .rec{font-size:13px;color:#cfc8d5;margin-top:6px;} .ord a{color:#8FB7E0;font-size:12px;text-decoration:none;display:inline-block;margin-top:8px;}
  .muted{color:#8d8596;font-size:13px;text-align:center;padding:22px;}
  .co{font-size:12px;color:#8d8596;}
  #pwForm input{font-family:inherit;font-size:15px;color:#F3EEE4;background:rgba(0,0,0,.22);border:1px solid rgba(243,238,228,.24);border-radius:10px;padding:12px;outline:none;width:100%;margin-bottom:8px;-webkit-appearance:none;}
  #pwForm input:focus{border-color:#9ad3a8;}
  #pwStatus{font-size:12.5px;min-height:16px;text-align:center;margin-top:4px;color:#9ad3a8;}
  .gate{position:fixed;inset:0;z-index:40;background:#141018;display:flex;align-items:center;justify-content:center;padding:24px;}
  .gate .box{max-width:340px;width:100%;text-align:center;}
  .gate h2{font-family:Georgia,'Songti SC',serif;font-size:26px;margin:0 0 6px;}
  .gate p{font-size:13px;color:#9b93a4;margin:0 0 18px;}
  .gate input{font-family:inherit;font-size:16px;color:#F3EEE4;background:rgba(243,238,228,.06);border:1px solid rgba(243,238,228,.24);
       border-radius:12px;padding:14px;outline:none;width:100%;text-align:center;-webkit-appearance:none;margin-bottom:10px;}
  .gate button{margin-top:6px;width:100%;padding:15px;border-radius:999px;border:none;background:#B0552F;color:#F3EEE4;font-family:inherit;font-size:15px;font-weight:500;cursor:pointer;}
  .gate .err{color:#e79b9b;font-size:12.5px;margin-top:12px;min-height:16px;}
  [hidden]{display:none !important;}
  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);z-index:60;background:#F3EEE4;color:#1A1E17;font-size:13px;padding:11px 20px;border-radius:999px;opacity:0;pointer-events:none;transition:.3s;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div class="gate" id="gate">
  <div class="box">
    <div class="mark">KMTY <b>星空</b></div>
    <h2>经销商登录</h2>
    <p>输入你的代号和密码</p>
    <input id="gid" type="text" autocapitalize="none" autocomplete="username" placeholder="代号（如 acme）">
    <input id="gpass" type="password" autocomplete="current-password" placeholder="密码" enterkeyhint="go">
    <button id="enter" type="button">登录</button>
    <div class="err" id="gateErr"></div>
  </div>
</div>

<div class="wrap" id="app" hidden>
  <div class="head" id="head"><span class="mark">KMTY <b>星空</b></span><span class="tag">经销商门户</span></div>
  <div class="linkcard">
    <p class="h">你的下单链接（发给你的客户）</p>
    <div class="url" id="mylink"></div>
    <div class="obar"><button class="btn solid" id="copy" type="button">复制链接</button><a class="btn" id="open" target="_blank" rel="noopener">打开</a><button class="btn" id="logout" type="button">退出</button></div>
  </div>
  <div class="linkcard" style="background:rgba(120,190,140,.08);border-color:rgba(120,190,140,.3);">
    <button class="btn" id="pwToggle" type="button" style="width:100%;">🔒 修改密码</button>
    <div id="pwForm" style="display:none;margin-top:12px;">
      <p class="lead" style="margin:0 0 10px;">改密码后，只有你知道 — KMTY 无法用你的账号登录查看。</p>
      <input id="pwCur" type="password" autocomplete="current-password" placeholder="当前密码">
      <input id="pwNew" type="password" autocomplete="new-password" placeholder="新密码（至少 4 位）">
      <input id="pwNew2" type="password" autocomplete="new-password" placeholder="确认新密码" enterkeyhint="go">
      <button class="btn solid" id="pwSave" type="button" style="width:100%;">保存新密码</button>
      <div id="pwStatus"></div>
    </div>
  </div>

  <div id="summary" class="linkcard" style="display:none;"></div>
  <h1>你的客户 <span class="co" id="ocount"></span></h1>
  <p class="lead">按客户（手机号）分组。首次通过<b>你的链接</b>下单的客户，以后所有订单（含直接下单）都算你的佣金。</p>
  <div id="olist"></div>
</div>

<div class="toast" id="toast"></div>

<script>
(function () {
  'use strict';
  // WeChat-safe custom domain used for the link shown to the reseller. Blank ⇒ current origin.
  var SHARE_ORIGIN = 'https://order.kmtyorchid.com';
  var SHARE_BASE = SHARE_ORIGIN || location.origin;
  var $ = function (id) { return document.getElementById(id); };
  var rid = '', rpass = '';
  try { rid = sessionStorage.getItem('kmty-rs-id') || ''; rpass = sessionStorage.getItem('kmty-rs-pass') || ''; } catch (e) {}
  var toastEl = $('toast'), toastT = 0;
  function toast(m) { toastEl.textContent = m; toastEl.classList.add('show'); clearTimeout(toastT); toastT = setTimeout(function () { toastEl.classList.remove('show'); }, 2000); }
  function esc(s) { return String(s == null ? '' : s); }

  var gate = $('gate'), app = $('app');
  function relock(msg) { try { sessionStorage.removeItem('kmty-rs-id'); sessionStorage.removeItem('kmty-rs-pass'); } catch (e) {} rid = rpass = ''; app.hidden = true; gate.hidden = false; if (msg) $('gateErr').textContent = msg; }
  $('logout').addEventListener('click', function () { relock(''); $('gid').value = ''; $('gpass').value = ''; });

  function enter() {
    var i = ($('gid').value || '').toLowerCase().replace(/[^a-z0-9_-]/g, ''), p = $('gpass').value || '';
    if (!i || !p) { $('gateErr').textContent = '请输入代号和密码'; return; }
    rid = i; rpass = p; login();
  }
  $('enter').addEventListener('click', enter);
  $('gpass').addEventListener('keydown', function (e) { if (e.key === 'Enter') enter(); });
  $('gid').addEventListener('keydown', function (e) { if (e.key === 'Enter') $('gpass').focus(); });

  function login() {
    $('gateErr').textContent = '登录中…';
    fetch('/api/orders', { headers: { 'x-reseller-id': rid, 'x-reseller-pass': rpass } })
      .then(function (r) {
        if (r.status === 401) { relock('代号或密码错误'); return null; }
        return r.json();
      })
      .then(function (j) {
        if (!j) return;
        try { sessionStorage.setItem('kmty-rs-id', rid); sessionStorage.setItem('kmty-rs-pass', rpass); } catch (e) {}
        gate.hidden = true; app.hidden = false;
        setupHeader(); renderDashboard(j.orders || [], j.self);
      })
      .catch(function () { $('gateErr').textContent = '网络错误，请重试'; });
  }

  function setupHeader() {
    var link = SHARE_BASE + '/r/' + rid;
    $('mylink').textContent = link; $('open').href = link;
    // pull the reseller's own branding for the header
    fetch('/api/reseller?id=' + encodeURIComponent(rid)).then(function (r) { return r.ok ? r.json() : null; }).then(function (b) {
      if (!b || !b.name) return;
      var h = $('head'); h.innerHTML = '';
      if (b.logo) { var im = document.createElement('img'); im.src = b.logo; im.alt = b.name; h.appendChild(im); }
      var sp = document.createElement('span'); sp.className = 'mark'; sp.textContent = b.name; h.appendChild(sp);
      var tg = document.createElement('span'); tg.className = 'tag'; tg.textContent = '经销商门户'; h.appendChild(tg);
      document.title = b.name + ' · 门户';
    }).catch(function () {});
  }
  $('copy').addEventListener('click', function () { var t = $('mylink').textContent; if (navigator.clipboard) navigator.clipboard.writeText(t); toast('已复制链接'); });

  function money(n) { return '¥' + (Math.round((+n || 0) * 100) / 100).toFixed(2); }
  function he(s) { return String(s == null ? '' : s).replace(/[&<>"]/g, function (c) { return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]; }); }
  function renderDashboard(list, self) {
    self = self || { rate: 0, price: 0 };
    var rate = self.rate || 0, price = self.price || 0;
    var byPhone = {}; list.forEach(function (o) { var p = o.phone || '(无)'; (byPhone[p] = byPhone[p] || []).push(o); });
    var phones = Object.keys(byPhone), totPlants = 0, totVal = 0;
    list.forEach(function (o) { var q = +o.qty || 0; totPlants += q; totVal += q * price; });
    var totCom = totVal * rate / 100;
    $('ocount').textContent = phones.length + ' 位客户 · ' + list.length + ' 单';
    var sm = $('summary');
    if (list.length) {
      sm.style.display = 'block';
      sm.innerHTML = '<p class="h">佣金结算</p>' +
        '<div style="font-size:14px;line-height:1.9;">佣金比例 <b>' + rate + '%</b> · 参考单价 <b>¥' + price + '/株</b><br>' +
        list.length + ' 单 · ' + totPlants + ' 株 · 货值 <b>' + money(totVal) + '</b><br>' +
        '<span style="color:#9ad3a8;font-size:18px;font-weight:700;">应得佣金 ' + money(totCom) + '</span></div>' +
        (rate ? '' : '<p class="co" style="margin:8px 0 0;">（佣金比例由 KMTY 设置后显示）</p>');
    } else sm.style.display = 'none';
    var el = $('olist'); el.innerHTML = '';
    if (!list.length) { el.innerHTML = '<div class="muted">还没有订单。把你的链接发给客户即可开始。</div>'; return; }
    phones.forEach(function (p) {
      var os = byPhone[p].slice().sort(function (a, b) { return (a.ts || 0) - (b.ts || 0); });
      var plants = 0, value = 0; os.forEach(function (o) { var q = +o.qty || 0; plants += q; value += q * price; });
      var commission = value * rate / 100, latest = os[os.length - 1], nm = latest.name || '—';
      var d = document.createElement('div'); d.className = 'ord';
      d.innerHTML = '<div class="who">' + he(nm) + ' <span class="co">' + he(p) + '</span></div>' +
        '<div class="meta">' + os.length + ' 单 · ' + plants + ' 株 · 货值 ' + money(value) + ' · <b style="color:#9ad3a8;">佣金 ' + money(commission) + '</b></div>' +
        '<div class="rec">最近：' + he(latest.recipe || '—') + ' · ' + he(latest.date || '') + '</div>';
      var a = document.createElement('a'); a.href = SHARE_BASE + '/r/' + rid + (latest.m ? '#m=' + latest.m : ''); a.target = '_blank'; a.rel = 'noopener'; a.textContent = '↗ 查看最近配色';
      d.appendChild(a); el.appendChild(d);
    });
  }

  // ---- self-service password change (KMTY won't know the new one) ----
  function pwSt(m, err) { var e = $('pwStatus'); e.textContent = m; e.style.color = err ? '#e79b9b' : '#9ad3a8'; }
  $('pwToggle').addEventListener('click', function () { var f = $('pwForm'); f.style.display = f.style.display === 'none' ? 'block' : 'none'; if (f.style.display === 'block') $('pwCur').focus(); });
  $('pwNew2').addEventListener('keydown', function (e) { if (e.key === 'Enter') $('pwSave').click(); });
  $('pwSave').addEventListener('click', function () {
    var cur = $('pwCur').value || '', np = $('pwNew').value || '', np2 = $('pwNew2').value || '';
    if (np.length < 4) { pwSt('新密码至少 4 位', 1); return; }
    if (np !== np2) { pwSt('两次新密码不一致', 1); return; }
    var b = $('pwSave'); b.disabled = true; pwSt('保存中…');
    fetch('/api/reseller-password', { method: 'POST', headers: { 'content-type': 'application/json', 'x-reseller-id': rid, 'x-reseller-pass': cur }, body: JSON.stringify({ newPass: np }) })
      .then(function (r) { return r.json().then(function (j) { return { ok: r.ok, status: r.status, j: j }; }); })
      .then(function (r) {
        b.disabled = false;
        if (r.ok && r.j.ok) {
          rpass = np; try { sessionStorage.setItem('kmty-rs-pass', np); } catch (e) {}
          $('pwCur').value = $('pwNew').value = $('pwNew2').value = '';
          pwSt('密码已修改 ✓ 请牢记新密码'); setTimeout(function () { $('pwForm').style.display = 'none'; pwSt(''); }, 1800);
        } else if (r.status === 401) pwSt('当前密码不正确', 1);
        else pwSt((r.j && r.j.error) || '修改失败', 1);
      }).catch(function () { b.disabled = false; pwSt('网络错误，请重试', 1); });
  });

  if (rid && rpass) login();
})();
</script>
</body>
</html>
