<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>店铺 · KMTY 星商</title>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#141018">
<link rel="stylesheet" href="/assets/ui.css">
<style>
  /* storefront-specific layer on top of the shared system */
  .shophead{padding:18px 16px 6px;max-width:960px;margin:0 auto}
  .shophead .logo{width:56px;height:56px;border-radius:14px;object-fit:cover;border:1px solid var(--line);background:var(--bg2)}
  .shopname{font-family:var(--serif);font-size:22px;font-weight:700;line-height:1.25}
  .anno{background:color-mix(in srgb,var(--acc) 14%,transparent);border-bottom:1px solid color-mix(in srgb,var(--acc) 25%,transparent);
    color:var(--ink);font-size:13px;padding:9px 16px;text-align:center}
  .bannerimg{max-width:960px;margin:10px auto 0;padding:0 16px}
  .bannerimg img{width:100%;aspect-ratio:21/8;object-fit:cover;border-radius:16px;border:1px solid var(--line)}
  .svcstrip{display:flex;gap:8px;overflow-x:auto;padding:12px 16px;max-width:960px;margin:0 auto;scrollbar-width:none}
  .svcstrip::-webkit-scrollbar{display:none}
  .svcstrip .chip{border-color:color-mix(in srgb,var(--acc) 35%,transparent);color:var(--ink);flex:0 0 auto;font-size:12.5px}
  .svcstrip .chip b{color:var(--acc)}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:6px 16px 40px;max-width:960px;margin:0 auto}
  @media(min-width:720px){.grid{grid-template-columns:repeat(3,1fr)}}
  @media(min-width:960px){.grid{grid-template-columns:repeat(4,1fr)}}
  .pcard{background:var(--panel);border:1px solid var(--line);border-radius:16px;overflow:hidden;cursor:pointer;
    transition:transform .15s,border-color .2s}
  .pcard:active{transform:scale(.98)}
  .pcard .ph{aspect-ratio:1;background:var(--bg2);position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;color:var(--faint);font-size:34px}
  .pcard .ph img{width:100%;height:100%;object-fit:cover}
  .pcard .ft{position:absolute;top:8px;left:8px;background:color-mix(in srgb,var(--acc) 88%,#000 6%);color:var(--acc-ink);
    font-size:11px;font-weight:600;border-radius:999px;padding:3px 9px}
  .pcard .bd{padding:10px 12px 12px}
  .pcard .t{font-size:14px;font-weight:600;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:2.6em}
  .pcard .specs{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px}
  .pcard .specs span{font-size:11px;color:var(--muted);border:1px solid var(--line);border-radius:6px;padding:1px 6px}
  .pcard .price{margin-top:8px;display:flex;align-items:baseline;gap:6px;flex-wrap:wrap}
  .pcard .price .v{color:var(--acc);font-weight:700;font-size:17px;font-family:var(--serif)}
  .pcard .price .u{font-size:11px;color:var(--muted)}
  .pcard .price .ask{color:var(--acc);font-size:13px;font-weight:600}
  .pcard .stock{font-size:11px;color:var(--faint);margin-top:3px}
  .filters{display:flex;gap:8px;overflow-x:auto;padding:4px 16px 10px;max-width:960px;margin:0 auto;scrollbar-width:none}
  .filters::-webkit-scrollbar{display:none}
  .filters .chip{cursor:pointer;flex:0 0 auto}
  .secttl{max-width:960px;margin:14px auto 0;padding:0 16px;font-size:13px;letter-spacing:.14em;color:var(--muted)}
  .featrail{display:flex;gap:12px;overflow-x:auto;padding:10px 16px;max-width:960px;margin:0 auto;scroll-snap-type:x mandatory;scrollbar-width:none}
  .featrail::-webkit-scrollbar{display:none}
  .featrail .pcard{flex:0 0 62%;max-width:270px;scroll-snap-align:start}
  @media(min-width:720px){.featrail .pcard{flex-basis:270px}}
  /* gallery */
  .gal{display:flex;overflow-x:auto;scroll-snap-type:x mandatory;border-radius:14px;scrollbar-width:none;background:var(--bg2)}
  .gal::-webkit-scrollbar{display:none}
  .gal img{width:100%;aspect-ratio:1;object-fit:cover;flex:0 0 100%;scroll-snap-align:center}
  .dots{display:flex;gap:5px;justify-content:center;margin-top:8px}
  .dots i{width:6px;height:6px;border-radius:50%;background:var(--line2)}
  .dots i.on{background:var(--acc)}
  .spectable{width:100%;border-collapse:collapse;margin:10px 0;font-size:13.5px}
  .spectable td{padding:7px 0;border-bottom:1px solid var(--line)}
  .spectable td:first-child{color:var(--muted);width:88px}
  .tiertable{width:100%;border-collapse:collapse;font-size:13.5px;margin:6px 0}
  .tiertable td{padding:6px 0;border-bottom:1px dashed var(--line)}
  .tiertable td:last-child{text-align:right;color:var(--acc);font-weight:600}
  .bigprice{font-family:var(--serif);font-size:26px;font-weight:700;color:var(--acc)}
  .stickycta{position:sticky;bottom:0;background:linear-gradient(transparent,var(--bg2) 30%);padding:14px 0 4px;margin-top:6px}
  .qty{display:flex;align-items:center;gap:0;border:1px solid var(--line2);border-radius:999px;overflow:hidden}
  .qty button{width:42px;height:44px;border:none;background:var(--panel2);color:var(--ink);font-size:19px;cursor:pointer}
  .qty input{border:none;border-radius:0;text-align:center;width:76px;background:transparent;padding:10px 0}
  .codebig{font-family:ui-monospace,Menlo,monospace;font-size:30px;font-weight:700;letter-spacing:.14em;color:var(--acc);text-align:center;margin:6px 0}
  .qrimg{width:180px;height:180px;border-radius:14px;margin:12px auto;display:block;background:#fff;object-fit:contain}
  .shopfoot{max-width:960px;margin:0 auto;padding:26px 16px 40px;text-align:center;color:var(--faint);font-size:12px;line-height:2}
  .aboutbox{max-width:960px;margin:4px auto 0;padding:0 16px;color:var(--muted);font-size:13.5px;line-height:1.8;white-space:pre-line}
  .constcard{max-width:960px;margin:6px auto;padding:0 16px}
  .constcard a{display:flex;align-items:center;gap:14px;background:linear-gradient(120deg,rgba(212,140,176,.16),rgba(46,78,158,.14));
    border:1px solid color-mix(in srgb,var(--acc) 30%,transparent);border-radius:16px;padding:16px;color:var(--ink)}
  .constcard .star{font-size:30px}
</style>
</head>
<body>
<div id="app"><div class="skel" style="height:120px;margin:16px"></div><div class="skel" style="height:300px;margin:16px"></div></div>
<script src="/assets/ui.js"></script>
<script src="/shop/app.js"></script>
</body>
</html>
