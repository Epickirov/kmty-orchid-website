<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>平台控制台 · KMTY 星商</title>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="robots" content="noindex,nofollow">
<meta name="theme-color" content="#141018">
<link rel="stylesheet" href="/assets/ui.css">
<style>
  .qmedia{display:flex;gap:6px;overflow-x:auto;margin:8px 0;scrollbar-width:none}
  .qmedia img{width:76px;height:76px;border-radius:9px;object-fit:cover;border:1px solid var(--line);flex:0 0 auto}
  .trow{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;padding:12px;border:1px solid var(--line);
    background:var(--panel);border-radius:14px;margin:10px 0}
  table.plain{width:100%;border-collapse:collapse;font-size:13px}
  table.plain td,table.plain th{padding:8px 6px;border-bottom:1px solid var(--line);text-align:left;vertical-align:top}
  table.plain th{color:var(--muted);font-weight:500;font-size:12px}
  .kpill{display:inline-block;padding:2px 8px;border-radius:6px;background:rgba(0,0,0,.25);font-size:12px;margin:1px}
</style>
</head>
<body>
<div id="app"></div>
<script src="/assets/ui.js"></script>
<script src="/admin/app.js"></script>
</body>
</html>
